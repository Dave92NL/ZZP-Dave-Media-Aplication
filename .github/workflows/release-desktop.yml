name: Release zzp-manager (Windows installer)

# Wydanie: podbij "version" w zzp-manager/package.json, commit, tag vX.Y.Z, push --tags.
# Workflow buduje instalator NSIS i publikuje GitHub Release z plikami, których
# szuka electron-updater: .exe + latest.yml + .blockmap.
on:
  push:
    tags: ['v*']
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: zzp-manager
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: zzp-manager/package-lock.json

      - run: npm ci

      - name: Build & publish installer
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --win --publish always
